<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: cover lets content reach under iPhone notch/home bar ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / App install ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS: run as fullscreen app when added to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SoulConnect" />
    <!-- black-translucent = content shows behind the status bar (app-like) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- iOS icons (Apple ignores manifest icons) -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.svg" />

    <!-- Android / browser theme color -->
    <meta name="theme-color" content="#1a0533" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- ── SEO & sharing ── -->
    <meta name="description" content="SoulConnect — Match with someone dealing with your exact problem. Free peer support + verified healers. You are not alone." />
    <meta property="og:title" content="SoulConnect — You Are Not Alone" />
    <meta property="og:description" content="Match with someone who truly understands what you're going through. 25 specific problems. Real people. Real healing." />
    <meta property="og:image" content="/icon.svg" />
    <meta name="twitter:card" content="summary" />

    <!-- Disable phone/email detection auto-link on iOS -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />

    <title>SoulConnect — You Are Not Alone</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      * { font-family: 'Plus Jakarta Sans', sans-serif; }

      html {
        scroll-behavior: smooth;
        /* Prevent iOS font-size inflation */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        /* Momentum scrolling on iOS */
        -webkit-overflow-scrolling: touch;
        /* Prevent pull-to-refresh and overscroll bounce */
        overscroll-behavior: none;
      }

      /* Remove blue tap flash on all elements */
      * {
        -webkit-tap-highlight-color: transparent;
      }

      /* Prevent callout (long press menu) on images/links */
      img, a {
        -webkit-touch-callout: none;
      }

      /* Buttons: no double-tap zoom, no text selection */
      button, a {
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      /* Inputs MUST be 16px+ to prevent iOS auto-zoom on focus */
      input, textarea, select {
        font-size: 16px !important;
      }

      /* ── Animations ── */
      @keyframes blob {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%       { transform: translate(30px, -50px) scale(1.1); }
        66%       { transform: translate(-20px, 20px) scale(0.9); }
      }
      .animate-blob { animation: blob 7s infinite; }
      .animation-delay-2000 { animation-delay: 2s; }
      .animation-delay-4000 { animation-delay: 4s; }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in-up { animation: fadeInUp 0.7s ease forwards; }
      .delay-100  { animation-delay: 0.1s; opacity: 0; }
      .delay-200  { animation-delay: 0.2s; opacity: 0; }
      .delay-300  { animation-delay: 0.3s; opacity: 0; }
      .delay-400  { animation-delay: 0.4s; opacity: 0; }
      .delay-500  { animation-delay: 0.5s; opacity: 0; }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); }
        50%       { box-shadow: 0 0 0 12px rgba(251,191,36,0); }
      }
      .pulse-glow { animation: pulse-glow 2s infinite; }

      /* Slide animations for mobile page transitions */
      @keyframes slideInFromRight {
        from { transform: translateX(100%); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      @keyframes slideInFromLeft {
        from { transform: translateX(-100%); opacity: 0; }
        to   { transform: translateX(0);     opacity: 1; }
      }
      .slide-from-right { animation: slideInFromRight 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
      .slide-from-left  { animation: slideInFromLeft  0.28s cubic-bezier(0.4,0,0.2,1) forwards; }

      /* Gradient text */
      .gradient-text {
        background: linear-gradient(135deg, #fbbf24, #f472b6, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
