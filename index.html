    <!-- ── Structured Data: WebSite (enables sitelinks search) ── -->

    <!-- ── Structured Data: FAQPage ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is SoulConnect free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Peer matching, chat, guided healing, and support circles are completely free. Verified healer sessions are paid per booking, starting at ₹600/session."
          }
        },
        {
          "@type": "Question",
          "name": "Is my identity kept anonymous on SoulConnect?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Completely anonymous. Your real name, phone number, and social media profiles are never shared with matches. You control exactly what you reveal."
          }
        },
        {
          "@type": "Question",
          "name": "Is SoulConnect a replacement for therapy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. SoulConnect provides peer support — real people who understand your struggle. For clinical care, we connect you with 500+ verified therapists and counsellors across India."
          }
        },
        {
          "@type": "Question",
          "name": "Which cities is SoulConnect available in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Online matching and peer support works across all of India. In-person support circles are available in Mumbai, Delhi, Bangalore, Pune, Chennai, Hyderabad and 44 more cities."
          }
        },
        {
          "@type": "Question",
          "name": "What problems does SoulConnect help with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SoulConnect supports 25 specific challenges including anxiety, depression, grief and loss, relationship breakups, marriage problems, loneliness, work stress, financial stress, panic attacks, PTSD and trauma, low confidence, sleep problems, family issues, OCD, trust issues, and anger management."
          }
        },
        {
          "@type": "Question",
          "name": "How does peer matching work on SoulConnect?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You select your primary challenge from 25 categories. Our algorithm matches you with someone experiencing the same specific issue — same anxiety, same type of breakup, same grief. Matches are anonymous and you control when and whether to connect."
          }
        },
        {
          "@type": "Question",
          "name": "Are the healers on SoulConnect verified?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All healers are verified professionals including clinical psychologists, counsellors, and certified wellness practitioners. Each profile shows their credentials, experience, specialisations, languages, and session rates."
          }
        },
        {
          "@type": "Question",
          "name": "What are SoulConnect support circles?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Support circles are intimate group sessions of 6 to 15 people with a shared challenge. They are anonymous, judgment-free, and facilitated by trained hosts. Available both online and in-person across India."
          }
        }
      ]
    }
    </script>

    <!-- Unregister any old service workers and clear stale caches -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    </script>

    <style>
      * { font-family: 'Plus Jakarta Sans', sans-serif; }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: none;
      }

      * { -webkit-tap-highlight-color: transparent; }

      /* Accessibility: visible focus rings */
      *:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 2px;
      }

      img, a { -webkit-touch-callout: none; }

      button, a {
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      input, textarea, select { font-size: 16px !important; }

      /* Screen-reader only utility */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }

      @keyframes blob {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%       { transform: translate(30px, -50px) scale(1.1); }
        66%       { transform: translate(-20px, 20px) scale(0.9); }
      }
      .animate-blob { animation: blob 7s infinite; }
      .animation-delay-2000 { animation-delay: 2s; }
      .animation-delay-4000 { animation-delay: 4s; }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in-up { animation: fadeInUp 0.7s ease forwards; }
      .delay-100  { animation-delay: 0.1s; opacity: 0; }
      .delay-200  { animation-delay: 0.2s; opacity: 0; }
      .delay-300  { animation-delay: 0.3s; opacity: 0; }
      .delay-400  { animation-delay: 0.4s; opacity: 0; }
      .delay-500  { animation-delay: 0.5s; opacity: 0; }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); }
        50%       { box-shadow: 0 0 0 12px rgba(251,191,36,0); }
      }
      .pulse-glow { animation: pulse-glow 2s infinite; }

      @keyframes slideInFromRight {
        from { transform: translateX(100%); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInFromLeft {
        from { transform: translateX(-100%); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
      }
      .slide-from-right { animation: slideInFromRight 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
      .slide-from-left  { animation: slideInFromLeft  0.28s cubic-bezier(0.4,0,0.2,1) forwards; }

      .gradient-text {
        background: linear-gradient(135deg, #fbbf24, #f472b6, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
