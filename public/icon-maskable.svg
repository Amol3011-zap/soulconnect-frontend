<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="lotus2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (maskable needs full fill) -->
  <rect width="512" height="512" fill="url(#bg2)"/>
  <!-- 8 lotus petals -->
  <g opacity="0.85">
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(45 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(90 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(135 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(180 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(225 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(270 256 256)"/>
    <ellipse cx="256" cy="180" rx="22" ry="52" fill="url(#lotus2)" transform="rotate(315 256 256)"/>
  </g>
  <g opacity="0.95">
    <ellipse cx="256" cy="216" rx="14" ry="32" fill="white" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="216" rx="14" ry="32" fill="white" transform="rotate(60 256 256)"/>
    <ellipse cx="256" cy="216" rx="14" ry="32" fill="white" transform="rotate(120 256 256)"/>
    <ellipse cx="256" cy="216" rx="14" ry="32" fill="white" transform="rotate(180 256 256)"/>
    <ellipse cx="256" cy="216" rx="14" ry="32" fill="white" transform="rotate(240 256 256)"/>
    <ellipse cx="256" cy="216" rx="14" ry="32" fill="white" transform="rotate(300 256 256)"/>
  </g>
  <circle cx="256" cy="256" r="36" fill="url(#lotus2)"/>
  <circle cx="256" cy="256" r="22" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="6" fill="url(#lotus2)"/>
</svg>
