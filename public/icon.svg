<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="lotus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Soft glow in center -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(192,132,252,0.15)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="rgba(192,132,252,0.12)" stroke-width="1"/>

  <!-- 8 lotus petals -->
  <g opacity="0.85">
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(45 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(90 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(135 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(180 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(225 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(270 256 256)"/>
    <ellipse cx="256" cy="170" rx="22" ry="52" fill="url(#lotus)" transform="rotate(315 256 256)"/>
  </g>

  <!-- Inner 6 petals brighter -->
  <g opacity="0.95">
    <ellipse cx="256" cy="210" rx="14" ry="36" fill="white" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="210" rx="14" ry="36" fill="white" transform="rotate(60 256 256)"/>
    <ellipse cx="256" cy="210" rx="14" ry="36" fill="white" transform="rotate(120 256 256)"/>
    <ellipse cx="256" cy="210" rx="14" ry="36" fill="white" transform="rotate(180 256 256)"/>
    <ellipse cx="256" cy="210" rx="14" ry="36" fill="white" transform="rotate(240 256 256)"/>
    <ellipse cx="256" cy="210" rx="14" ry="36" fill="white" transform="rotate(300 256 256)"/>
  </g>

  <!-- Center circle -->
  <circle cx="256" cy="256" r="36" fill="url(#lotus)"/>
  <circle cx="256" cy="256" r="22" fill="white" opacity="0.95"/>

  <!-- Star dot in center -->
  <circle cx="256" cy="256" r="6" fill="url(#lotus)"/>

  <!-- 8 small outer dots -->
  <g fill="rgba(192,132,252,0.6)">
    <circle cx="256" cy="100" r="4"/>
    <circle cx="369" cy="143" r="4"/>
    <circle cx="412" cy="256" r="4"/>
    <circle cx="369" cy="369" r="4"/>
    <circle cx="256" cy="412" r="4"/>
    <circle cx="143" cy="369" r="4"/>
    <circle cx="100" cy="256" r="4"/>
    <circle cx="143" cy="143" r="4"/>
  </g>
</svg>
